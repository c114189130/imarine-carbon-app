<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>貨櫃指派 - {{ app_title }}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">🌊 {{ app_title }}</div>
        <div class="navbar-links">
            <a href="/">🏠 首頁</a>
            <a href="/input">🚢 開始指派</a>
            <a href="/history_page">📊 歷史記錄</a>
            <a href="/dashboard">📈 Dashboard</a>
        </div>
    </nav>
    <div class="container">
        <div class="card fade-in" style="max-width:500px; margin:0 auto">
            <h2>🚢 貨櫃指派系統</h2>
            <div class="form-group"><label>📍 起點港口</label><select id="start"><option value="kaohsiung">高雄港</option><option value="taichung">台中港</option></select></div>
            <div class="form-group"><label>📍 終點港口</label><select id="end"><option value="taichung">台中港</option><option value="kaohsiung">高雄港</option></select></div>
            <div class="form-group"><label>📦 貨櫃數量 (FEU)</label><input type="number" id="containers" min="1" value="50"></div>
            <button class="btn btn-primary" onclick="goToResult()" style="width:100%">🚀 AI 智慧指派</button>
        </div>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
