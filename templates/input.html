<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>運輸評估 - iMarine</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">🌊 iMarine 智慧海運碳排管理系統</div>
        <div class="navbar-links">
            <a href="/">🏠 首頁</a>
            <a href="/input">🚢 開始計算</a>
            <a href="/history_page">📊 歷史記錄</a>
            <a href="/dashboard">📈 Dashboard</a>
        </div>
    </nav>
    
    <div class="container">
        <div class="card" style="max-width:600px; margin:0 auto">
            <h2>🚢 運輸路線評估</h2>
            <p style="color:var(--french-blue)">請填寫以下資訊，AI 將為您分析最佳運輸方案</p>
            
            <div class="form-group">
                <label>📍 起點港口</label>
                <select id="start">
                    <option value="kaohsiung">高雄港</option>
                    <option value="taichung">台中港</option>
                    <option value="keelung">基隆港</option>
                    <option value="taipei">台北港</option>
                    <option value="hualien">花蓮港</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>📍 終點港口</label>
                <select id="end">
                    <option value="taichung">台中港</option>
                    <option value="kaohsiung">高雄港</option>
                    <option value="keelung">基隆港</option>
                    <option value="taipei">台北港</option>
                    <option value="hualien">花蓮港</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>📦 貨櫃數量 (FEU)</label>
                <input type="number" id="containers" placeholder="請輸入貨櫃數量" min="1" value="10">
                <p style="font-size:0.8rem; margin-top:0.3rem">※ 1 FEU = 1 個 40 呎貨櫃 = 2 TEU</p>
            </div>
            
            <div class="form-group">
                <label>📦 貨物類型</label>
                <select id="cargoType">
                    <option value="general">📦 一般貨物</option>
                    <option value="high_value">💎 高價值電子產品</option>
                    <option value="perishable">🍎 生鮮/冷鏈貨物</option>
                    <option value="bulk">⛰️ 大宗原物料</option>
                    <option value="just_in_time">⚙️ JIT 即時生產</option>
                </select>
            </div>
            
            <div style="margin:1.5rem 0">
                <h3>🎯 AI 決策權重</h3>
                <div class="form-group">
                    <label>💰 成本權重 <span id="costValue" class="weight-value">40%</span></label>
                    <input type="range" id="costSlider" class="weight-slider" min="0" max="1" step="0.01" value="0.4">
                </div>
                <div class="form-group">
                    <label>🌱 碳排權重 <span id="carbonValue" class="weight-value">40%</span></label>
                    <input type="range" id="carbonSlider" class="weight-slider" min="0" max="1" step="0.01" value="0.4">
                </div>
                <div class="form-group">
                    <label>⚠️ 風險權重 <span id="riskValue" class="weight-value">20%</span></label>
                    <input type="range" id="riskSlider" class="weight-slider" min="0" max="1" step="0.01" value="0.2">
                </div>
                <div style="display:flex; gap:0.5rem; flex-wrap:wrap">
                    <button type="button" id="preset-balanced" class="btn btn-outline">⚖️ 平衡型</button>
                    <button type="button" id="preset-cost" class="btn btn-outline">💰 成本優先</button>
                    <button type="button" id="preset-green" class="btn btn-outline">🌱 環保優先</button>
                    <button type="button" id="preset-safe" class="btn btn-outline">🛡️ 安全優先</button>
                </div>
            </div>
            
            <button class="btn btn-primary" onclick="goToResult()" style="width:100%">📊 開始分析</button>
            <button class="btn btn-outline" onclick="location.href='/'" style="width:100%; margin-top:0.5rem">🏠 返回首頁</button>
        </div>
        
        <div class="card">
            <h3>📌 計算說明</h3>
            <ul>
                <li>碳排放係數依據 CNS 14064-1 國家標準</li>
                <li>社會成本包含：空氣污染、噪音、肇事成本</li>
                <li>VSL 統計生命價值：NT$5,000萬元</li>
                <li>時間成本依據貨物價值與利率計算</li>
                <li>AI 會根據即時路況與船期動態調整</li>
            </ul>
        </div>
    </div>
    
    <script src="/static/app.js"></script>
</body>
</html>
