<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分析結果 - iMarine</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body onload="calculate()">
    <nav class="navbar">
        <div class="navbar-brand">🌊 iMarine 智慧海運碳排管理系統</div>
        <div class="navbar-links"><a href="/">🏠 首頁</a><a href="/input">🚢 開始計算</a><a href="/history_page">📊 歷史記錄</a><a href="/dashboard">📈 Dashboard</a></div>
    </nav>
    <div class="container">
        <div id="result"></div>
        <div class="card"><h3>🚦 即時運輸狀態</h3><div style="display:flex; gap:2rem; flex-wrap:wrap"><div style="flex:1"><p>🚛 <strong>公路狀態</strong></p><p id="roadStatus" style="font-size:1.2rem">-</p><p id="roadSpeed" style="font-size:0.9rem">-</p></div><div style="flex:1"><p>🚢 <strong>船舶狀態</strong></p><p id="shipStatus" style="font-size:1.2rem">-</p><p id="shipCapacity" style="font-size:0.9rem">-</p></div></div></div>
        <div class="card" style="background:linear-gradient(135deg,var(--deep-twilight),var(--bright-teal-blue));color:white"><h3>🧠 AI 貨櫃調度建議</h3><div id="dispatchResult">分析中...</div></div>
        <div class="chart-container"><h3>💰 成本結構比較</h3><canvas id="comparisonChart"></canvas></div>
        <div class="chart-container"><h3>🏛️ 社會成本分析</h3><canvas id="socialCostChart"></canvas></div>
        <div class="chart-container"><h3>⚠️ VSL 人命風險成本</h3><canvas id="vslChart"></canvas></div>
        <div class="chart-container"><h3>⏳ 時間成本分析</h3><canvas id="timeCostChart"></canvas></div>
        <div class="chart-container"><h3>🌍 碳排放比較</h3><canvas id="carbonChart"></canvas></div>
        <div style="display:flex; gap:1rem; justify-content:center"><button class="btn btn-success" onclick="goToCertificate()">📄 產生碳排認證</button><button class="btn btn-outline" onclick="window.location.href='/input'">🔄 重新計算</button></div>
    </div>
    <style>.chart-note{font-size:0.85rem;color:var(--french-blue);margin-top:0.8rem;padding-top:0.5rem;border-top:1px solid var(--frosted-blue-2);text-align:center}.劣势{color:#e74c3c;font-weight:bold}.优势{color:#27ae60;font-weight:bold}</style>
    <script src="/static/app.js"></script>
</body>
</html>
