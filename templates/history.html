<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>歷史記錄 - {{ app_title }}</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body onload="loadHistory()">
    <nav class="navbar">
        <div class="navbar-brand">🌊 {{ app_title }}</div>
        <div class="navbar-links"><a href="/">🏠 首頁</a><a href="/input">🚢 開始指派</a><a href="/history_page">📊 歷史記錄</a><a href="/dashboard">📈 Dashboard</a></div>
    </nav>
    <div class="container">
        <h1>📊 貨櫃指派歷史記錄</h1>
        <div class="chart-container fade-in"><canvas id="historyChart"></canvas></div>
        <div class="card fade-in"><div style="overflow-x:auto"><table class="history-table"><thead><tr><th>時間</th><th>起點</th><th>終點</th><th>貨櫃數</th><th>距離</th><th>海運碳排</th><th>最佳方案</th><th>減碳量</th><th>減碳比例</th></table></thead><tbody id="historyBody"><tr><td colspan="9">載入中...</td></tr></tbody></table></div></div>
        <button class="btn btn-outline" onclick="location.href='/'">🏠 返回首頁</button>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
