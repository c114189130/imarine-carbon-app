<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iMarine 智慧海運碳排管理系統</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">🌊 iMarine 智慧海運碳排管理系統</div>
        <div class="navbar-links">
            <a href="/">🏠 首頁</a>
            <a href="/input">🚢 開始計算</a>
            <a href="/history_page">📊 歷史記錄</a>
            <a href="/dashboard">📈 Dashboard</a>
        </div>
    </nav>
    
    <div class="container">
        <div class="hero">
            <h1>打造綠色航運 · 邁向淨零排放</h1>
            <p>🤖 AI 多目標決策引擎 | 🌱 社會成本與 VSL 評估 | 🚦 即時路況調度</p>
            <button class="btn btn-primary" onclick="location.href='/input'">🚀 立即評估</button>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card"><h3>-66%</h3><p>海運 vs 公路碳排</p></div>
            <div class="stat-card"><h3>5+</h3><p>台灣主要港口</p></div>
            <div class="stat-card"><h3>NT$5,000萬</h3><p>統計生命價值(VSL)</p></div>
            <div class="stat-card"><h3>CNS 14064</h3><p>國家標準認證</p></div>
        </div>
        
        <div class="card">
            <h2>🤖 AI 多目標決策引擎</h2>
            <p>系統根據貨物類型、即時路況與船期，結合社會成本與碳排放分析，自動推薦最佳運輸方案。</p>
            <div style="display:flex; gap:1rem; justify-content:center; margin-top:1rem">
                <div style="text-align:center"><span style="font-size:2rem">💰</span><br>運費成本</div>
                <div style="text-align:center"><span style="font-size:2rem">🌱</span><br>碳排放</div>
                <div style="text-align:center"><span style="font-size:2rem">⚠️</span><br>VSL風險</div>
                <div style="text-align:center"><span style="font-size:2rem">⏱️</span><br>時間成本</div>
            </div>
        </div>
    </div>
    
    <script src="/static/app.js"></script>
</body>
</html>
